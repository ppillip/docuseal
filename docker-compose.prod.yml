version: '3.8'

services:
  app:
    image: docuseal-custom:prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 3000:3000
    volumes:
      - ./docuseal-data:/data
    environment:
      - HOST=${HOST:-localhost}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docuseal
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true

  postgres:
    image: postgres:15-alpine
    restart: always
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docuseal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:latest
    restart: always
    command: caddy reverse-proxy --from ${HOST:-localhost}:${PORT:-80} --to app:3000
    ports:
      - ${PORT:-80}:${PORT:-80}
      - 443:443
    depends_on:
      - app
    volumes:
      - ./caddy_data:/data
      - ./caddy_config:/config
